name: GoMobileExperiment

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    # gomobile xcframeworks aren't sandbox-clean
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  GoMobileExperiment:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: "0.1"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      # gRPC backend address baked in via Info.plist. The ${...} is xcodegen
      # env substitution: at project-generation time, BACKEND_ENDPOINT is read
      # from the environment. The iOS build scripts ensure it's set (default
      # localhost:7777) before invoking xcodegen.
      INFOPLIST_KEY_BackendEndpoint: ${BACKEND_ENDPOINT}
      CODE_SIGNING_ALLOWED: NO
      # Go's runtime pulls in BSD libresolv for DNS lookups as soon as the
      # net package is reachable (e.g. via grpc-go). Without this, linking
      # fails with "_res_9_ninit / _res_9_nclose / _res_9_nsearch" undefined.
      OTHER_LDFLAGS: $(inherited) -lresolv.9
    dependencies:
      # Built by `gomobile bind -target=ios` (run by build-ios-app.sh).
      # Relative path: mobile/apps/ios/ → project root is 3 levels up.
      - framework: ../../../build/Core.xcframework
        embed: true
        codeSign: true
